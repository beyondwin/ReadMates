services:
  mysql:
    image: mysql:8.4
    container_name: readmates-mysql
    environment:
      MYSQL_ROOT_PASSWORD: readmates-root
      MYSQL_DATABASE: readmates
      MYSQL_USER: readmates
      MYSQL_PASSWORD: readmates
    ports:
      - "3306:3306"
    volumes:
      - readmates-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -ureadmates -preadmates --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    container_name: readmates-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"

volumes:
  readmates-mysql-data:
