services:
  prometheus:
    image: prom/prometheus:v2.55.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--enable-feature=exemplar-storage"
    ports:
      - "127.0.0.1:${READMATES_LOCAL_PROMETHEUS_PORT:-9090}:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../prometheus/alerts:/etc/prometheus/alerts:ro
      - readmates-local-prometheus:/prometheus
    depends_on:
      tempo:
        condition: service_healthy

  tempo:
    image: grafana/tempo:2.10.5
    command:
      - "--config.file=/etc/tempo/tempo.yml"
    ports:
      - "127.0.0.1:${READMATES_LOCAL_TEMPO_PORT:-3200}:3200"
      - "127.0.0.1:${READMATES_LOCAL_OTLP_HTTP_PORT:-4318}:4318"
    volumes:
      - ../../tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - readmates-local-tempo:/var/tempo
    healthcheck:
      test: ["CMD", "/tempo", "--config.file=/etc/tempo/tempo.yml", "--config.verify=true"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  grafana:
    image: grafana/grafana:11.5.1
    ports:
      - "127.0.0.1:${READMATES_LOCAL_GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: readmates
      GF_SECURITY_ADMIN_PASSWORD: readmates
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../grafana/dashboards:/var/lib/grafana/dashboards/readmates:ro
      - readmates-local-grafana:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
      tempo:
        condition: service_healthy

volumes:
  readmates-local-prometheus:
  readmates-local-grafana:
  readmates-local-tempo:
