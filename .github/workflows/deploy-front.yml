name: Deploy Front

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  deployments: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Cloudflare Pages
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://readmates.pages.dev
    defaults:
      run:
        working-directory: front
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Set up pnpm from packageManager
        working-directory: .
        run: |
          if command -v corepack >/dev/null 2>&1; then
            corepack_cmd=(corepack)
          else
            corepack_cmd=(npx --yes corepack@0.35.0)
          fi
          "${corepack_cmd[@]}" enable
          "${corepack_cmd[@]}" prepare "$(node -p "require('./package.json').packageManager")" --activate
          "${corepack_cmd[@]}" pnpm --version

      - name: Restore pnpm cache
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Check zod fixtures are up to date
        run: |
          pnpm zod:export-fixtures
          git diff --exit-code tests/unit/__fixtures__/zod-schemas/

      - name: Deploy to Cloudflare Pages
        run: |
          npx --yes wrangler@4.84.1 pages deploy dist \
            --project-name readmates \
            --branch main \
            --commit-dirty=false
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upload frontend failure diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deploy-front-failure-diagnostics
          path: |
            front/test-results
            front/dist
          if-no-files-found: ignore
