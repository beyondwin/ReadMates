name: Deploy Server Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "GHCR image tag to publish, for example v1.2.0"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and push GHCR image
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}

      - name: Log in to GHCR
        uses: docker/login-action@11f9a3f1bbfb5a0e7ef0f419ca55f271fdd53c44 # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: image
        env:
          DISPATCH_IMAGE_TAG: ${{ inputs.image_tag || '' }}
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}/readmates-server"
          image_tag="${DISPATCH_IMAGE_TAG:-${GITHUB_REF_NAME}}"
          if [[ ! "$image_tag" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Invalid Docker image tag: $image_tag" >&2
            exit 1
          fi
          echo "name=$image_name" >> "$GITHUB_OUTPUT"
          echo "tag=$image_tag" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: server
          file: server/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ steps.image.outputs.tag }}
