# Single-module project: parallel=true has no effect; left explicit for clarity.
org.gradle.parallel=false

# Configuration cache.
org.gradle.configuration-cache=true

# Local build cache. Reuses task outputs across invocations on the same machine.
org.gradle.caching=true

# Daemon (default true, made explicit for measurement determinism).
org.gradle.daemon=true

# JVM options. 4 GB heap suits the GitHub-hosted ubuntu-latest runner (16 GB)
# and typical local dev. G1GC and explicit UTF-8 to align local + CI behavior.
org.gradle.jvmargs=-Xmx4g -XX:+UseG1GC -Dfile.encoding=UTF-8
