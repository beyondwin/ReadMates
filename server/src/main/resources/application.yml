spring:
  application:
    name: readmates-server
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/readmates?serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:readmates}
    password: ${SPRING_DATASOURCE_PASSWORD:readmates}
    hikari:
      connection-init-sql: set time_zone = '+00:00'
  data:
    redis:
      url: ${READMATES_REDIS_URL:redis://localhost:6379}
      timeout: ${READMATES_REDIS_COMMAND_TIMEOUT:250ms}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: ${READMATES_FLYWAY_LOCATIONS:classpath:db/mysql/migration}

management:
  server:
    address: ${READMATES_MANAGEMENT_ADDRESS:127.0.0.1}
    port: ${READMATES_MANAGEMENT_PORT:8081}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  health:
    redis:
      enabled: ${READMATES_REDIS_ENABLED:false}
  metrics:
    tags:
      application: ${spring.application.name}

readmates:
  app-base-url: ${READMATES_APP_BASE_URL:http://localhost:3000}
  auth:
    auth-base-url: ${READMATES_AUTH_BASE_URL:${READMATES_APP_BASE_URL:http://localhost:3000}}
    return-state-secret: ${READMATES_AUTH_RETURN_STATE_SECRET:dev-return-state-secret}
    return-state-ttl: ${READMATES_AUTH_RETURN_STATE_TTL:10m}
    session-cookie-domain: ${READMATES_AUTH_SESSION_COOKIE_DOMAIN:}
  bff-secret-required: ${READMATES_BFF_SECRET_REQUIRED:true}
  notifications:
    enabled: ${READMATES_NOTIFICATIONS_ENABLED:false}
    sender-name: ${READMATES_NOTIFICATION_SENDER_NAME:ReadMates}
    sender-email: ${READMATES_NOTIFICATION_SENDER_EMAIL:no-reply@example.com}
    reminder-cron: ${READMATES_NOTIFICATION_REMINDER_CRON:0 0 0 * * *}
    reminder-zone: ${READMATES_NOTIFICATION_REMINDER_ZONE:Asia/Seoul}
    worker:
      enabled: ${READMATES_NOTIFICATION_WORKER_ENABLED:false}
      fixed-delay-ms: ${READMATES_NOTIFICATION_WORKER_FIXED_DELAY_MS:30000}
      batch-size: ${READMATES_NOTIFICATION_WORKER_BATCH_SIZE:20}
      max-attempts: ${READMATES_NOTIFICATION_MAX_ATTEMPTS:5}
    kafka:
      enabled: ${READMATES_KAFKA_ENABLED:false}
      bootstrap-servers: ${READMATES_KAFKA_BOOTSTRAP_SERVERS:}
      events-topic: ${READMATES_KAFKA_NOTIFICATION_EVENTS_TOPIC:readmates.notification.events.v1}
      dlq-topic: ${READMATES_KAFKA_NOTIFICATION_DLQ_TOPIC:readmates.notification.events.dlq.v1}
      consumer-group: ${READMATES_KAFKA_NOTIFICATION_CONSUMER_GROUP:readmates-notification-dispatcher}
      relay-batch-size: ${READMATES_KAFKA_NOTIFICATION_RELAY_BATCH_SIZE:50}
      max-publish-attempts: ${READMATES_KAFKA_NOTIFICATION_MAX_PUBLISH_ATTEMPTS:5}
      max-delivery-attempts: ${READMATES_NOTIFICATION_MAX_DELIVERY_ATTEMPTS:5}
  redis:
    enabled: ${READMATES_REDIS_ENABLED:false}
  rate-limit:
    enabled: ${READMATES_RATE_LIMIT_ENABLED:false}
    fail-closed-sensitive: ${READMATES_RATE_LIMIT_FAIL_CLOSED_SENSITIVE:false}
  auth-session-cache:
    enabled: ${READMATES_AUTH_SESSION_CACHE_ENABLED:false}
    session-ttl: ${READMATES_AUTH_SESSION_CACHE_TTL:10m}
    touch-throttle-ttl: ${READMATES_AUTH_SESSION_TOUCH_THROTTLE_TTL:5m}
  public-cache:
    enabled: ${READMATES_PUBLIC_CACHE_ENABLED:false}
    club-ttl: ${READMATES_PUBLIC_CLUB_CACHE_TTL:15m}
    session-ttl: ${READMATES_PUBLIC_SESSION_CACHE_TTL:15m}
  notes-cache:
    enabled: ${READMATES_NOTES_CACHE_ENABLED:false}
    feed-ttl: ${READMATES_NOTES_FEED_CACHE_TTL:3m}
