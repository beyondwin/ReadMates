spring:
  application:
    name: readmates-server
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/readmates?serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:readmates}
    password: ${SPRING_DATASOURCE_PASSWORD:readmates}
    hikari:
      connection-init-sql: set time_zone = '+00:00'
  data:
    redis:
      url: ${READMATES_REDIS_URL:redis://localhost:6379}
      timeout: ${READMATES_REDIS_COMMAND_TIMEOUT:250ms}
  flyway:
    enabled: true
    locations: ${READMATES_FLYWAY_LOCATIONS:classpath:db/mysql/migration}

management:
  server:
    address: ${READMATES_MANAGEMENT_ADDRESS:127.0.0.1}
    port: ${READMATES_MANAGEMENT_PORT:8081}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,prometheus
  health:
    redis:
      enabled: ${READMATES_REDIS_ENABLED:false}
  metrics:
    tags:
      application: ${spring.application.name}

readmates:
  app-base-url: ${READMATES_APP_BASE_URL:http://localhost:3000}
  auth:
    auth-base-url: ${READMATES_AUTH_BASE_URL:${READMATES_APP_BASE_URL:http://localhost:3000}}
    return-state-secret: ${READMATES_AUTH_RETURN_STATE_SECRET:}
    return-state-ttl: ${READMATES_AUTH_RETURN_STATE_TTL:10m}
    session-cookie-domain: ${READMATES_AUTH_SESSION_COOKIE_DOMAIN:}
  bff-secret: ${READMATES_BFF_SECRET:}
  bff-secret-required: ${READMATES_BFF_SECRET_REQUIRED:true}
  security:
    bff:
      secrets: ${READMATES_BFF_SECRETS:}
    ip-hash:
      base-secret: ${READMATES_IP_HASH_BASE_SECRET:}
      allow-empty-secret: false
  notifications:
    enabled: ${READMATES_NOTIFICATIONS_ENABLED:false}
    sender-name: ${READMATES_NOTIFICATION_SENDER_NAME:ReadMates}
    sender-email: ${READMATES_NOTIFICATION_SENDER_EMAIL:no-reply@example.com}
    reminder-cron: ${READMATES_NOTIFICATION_REMINDER_CRON:0 0 0 * * *}
    reminder-zone: ${READMATES_NOTIFICATION_REMINDER_ZONE:Asia/Seoul}
    retry-delay-minutes: ${READMATES_NOTIFICATION_RETRY_DELAY_MINUTES:5,15,60,240}
    worker:
      enabled: ${READMATES_NOTIFICATIONS_WORKER_ENABLED:true}
      fixed-delay-ms: ${READMATES_NOTIFICATION_WORKER_FIXED_DELAY_MS:30000}
      batch-size: ${READMATES_NOTIFICATION_WORKER_BATCH_SIZE:20}
      max-attempts: ${READMATES_NOTIFICATION_MAX_ATTEMPTS:5}
    kafka:
      enabled: ${READMATES_KAFKA_ENABLED:false}
      bootstrap-servers: ${READMATES_KAFKA_BOOTSTRAP_SERVERS:}
      events-topic: ${READMATES_KAFKA_NOTIFICATION_EVENTS_TOPIC:readmates.notification.events.v1}
      dlq-topic: ${READMATES_KAFKA_NOTIFICATION_DLQ_TOPIC:readmates.notification.events.dlq.v1}
      consumer-group: ${READMATES_KAFKA_NOTIFICATION_CONSUMER_GROUP:readmates-notification-dispatcher}
      relay-batch-size: ${READMATES_KAFKA_NOTIFICATION_RELAY_BATCH_SIZE:50}
      max-publish-attempts: ${READMATES_KAFKA_NOTIFICATION_MAX_PUBLISH_ATTEMPTS:5}
      max-delivery-attempts: ${READMATES_NOTIFICATION_MAX_DELIVERY_ATTEMPTS:5}
  redis:
    enabled: ${READMATES_REDIS_ENABLED:false}
  rate-limit:
    enabled: ${READMATES_RATE_LIMIT_ENABLED:false}
    fail-closed-sensitive: ${READMATES_RATE_LIMIT_FAIL_CLOSED_SENSITIVE:false}
  auth-session-cache:
    enabled: ${READMATES_AUTH_SESSION_CACHE_ENABLED:false}
    session-ttl: ${READMATES_AUTH_SESSION_CACHE_TTL:10m}
    touch-throttle-ttl: ${READMATES_AUTH_SESSION_TOUCH_THROTTLE_TTL:5m}
  public-cache:
    enabled: ${READMATES_PUBLIC_CACHE_ENABLED:false}
    club-ttl: ${READMATES_PUBLIC_CLUB_CACHE_TTL:15m}
    session-ttl: ${READMATES_PUBLIC_SESSION_CACHE_TTL:15m}
  notes-cache:
    enabled: ${READMATES_NOTES_CACHE_ENABLED:false}
    feed-ttl: ${READMATES_NOTES_FEED_CACHE_TTL:3m}
  aigen:
    # Provider API keys (set by ops; read by SDK clients per provider):
    #   READMATES_AIGEN_ANTHROPIC_API_KEY (Claude)
    #   READMATES_AIGEN_OPENAI_API_KEY    (OpenAI - task 4.2)
    #   READMATES_AIGEN_GEMINI_API_KEY    (Gemini - task 5.1)
    enabled: ${READMATES_AIGEN_ENABLED:false}
    mock: ${READMATES_AIGEN_MOCK:false}
    # Canonical provider names: CLAUDE, OPENAI, GEMINI. Empty default = kill switch.
    enabled-providers: ${READMATES_AIGEN_ENABLED_PROVIDERS:}
    fallback-default-model: ${READMATES_AIGEN_FALLBACK_DEFAULT_MODEL:claude-sonnet-4-6}
    caps:
      host-daily-calls: ${READMATES_AIGEN_HOST_DAILY_CALLS:10}
      club-monthly-cost-usd: ${READMATES_AIGEN_CLUB_MONTHLY_COST_USD:20.00}
      host-per-minute-calls: ${READMATES_AIGEN_HOST_PER_MINUTE_CALLS:5}
      soft-warning-ratio: ${READMATES_AIGEN_SOFT_WARNING_RATIO:0.80}
    job:
      redis-ttl: ${READMATES_AIGEN_REDIS_TTL:6h}
      notification-latency-threshold: ${READMATES_AIGEN_NOTIFICATION_LATENCY_THRESHOLD:60s}
      max-llm-calls-per-job: ${READMATES_AIGEN_MAX_LLM_CALLS_PER_JOB:3}
    pricing:
      claude-sonnet-4-6:
        input-per-m-token-usd: 3.00
        cached-input-per-m-token-usd: 0.30
        output-per-m-token-usd: 15.00
      claude-opus-4-7:
        input-per-m-token-usd: 15.00
        cached-input-per-m-token-usd: 1.50
        output-per-m-token-usd: 75.00
      # OpenAI public API pricing (gpt-4.1 family, per-million-token, USD).
      # Source: OpenAI model docs for gpt-4.1 and gpt-4.1-mini (verified 2026-05-17).
      "[gpt-4.1]":
        input-per-m-token-usd: 2.00
        cached-input-per-m-token-usd: 0.50
        output-per-m-token-usd: 8.00
      "[gpt-4.1-mini]":
        input-per-m-token-usd: 0.40
        cached-input-per-m-token-usd: 0.10
        output-per-m-token-usd: 1.60
      # Gemini public API pricing (2.5 family, per-million-token, USD).
      # Source: ai.google.dev/pricing (verified at task 5.1 implementation; for <=200K input tokens).
      gemini-2-5-pro:
        input-per-m-token-usd: 1.25
        cached-input-per-m-token-usd: 0.31
        output-per-m-token-usd: 10.00
      gemini-2-5-flash:
        input-per-m-token-usd: 0.30
        cached-input-per-m-token-usd: 0.075
        output-per-m-token-usd: 2.50
    kafka:
      enabled: ${READMATES_AIGEN_KAFKA_ENABLED:false}
      bootstrap-servers: ${READMATES_AIGEN_KAFKA_BOOTSTRAP_SERVERS:}
      topic-jobs: ${READMATES_AIGEN_KAFKA_TOPIC_JOBS:readmates.aigen.jobs.v1}
      consumer-group: ${READMATES_AIGEN_KAFKA_CONSUMER_GROUP:readmates-aigen-worker}
