spring:
  flyway:
    locations: classpath:db/mysql/migration,classpath:db/mysql/dev

readmates:
  auth:
    return-state-secret: "dev-return-state-secret-for-local-only"
  bff-secret-required: false
  redis:
    enabled: false
  rate-limit:
    enabled: false
  auth-session-cache:
    enabled: false
  public-cache:
    enabled: false
  notes-cache:
    enabled: false
  aigen:
    enabled: false
    mock: false
  dev:
    login-enabled: true
    google-oauth-auto-member-enabled: false
